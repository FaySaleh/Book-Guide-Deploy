<div class="auth-page">
  <div class="auth-card">
    <div class="auth-head">
<app-auth-header></app-auth-header>
      <p class="muted">Enter your email and we’ll send you a reset link.</p>
    </div>

    <div class="field">
      <label>Email</label>
      <input [(ngModel)]="email" type="email" placeholder="you@example.com" />
    </div>

    <button class="btn" (click)="submit()" [disabled]="loading">
      {{ loading ? 'Sending...' : 'Send reset link' }}
    </button>

    <p class="msg ok" *ngIf="message">{{ message }}</p>
    <p class="msg err" *ngIf="error">{{ error }}</p>

    <div class="footer">
      <a routerLink="/login">Back to login</a>
    </div>
  </div>
</div>
