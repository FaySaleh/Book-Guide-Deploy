
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-head">
        <app-auth-header></app-auth-header>
      <p class="muted">Set a new password for your account.</p>
    </div>

    <p class="msg err" *ngIf="error">{{ error }}</p>
    <p class="msg ok" *ngIf="message">{{ message }}</p>

    <div class="field">
      <label>New password</label>
      <input [(ngModel)]="newPassword" type="password" placeholder="********" />
    </div>

    <div class="field">
      <label>Confirm password</label>
      <input [(ngModel)]="confirmPassword" type="password" placeholder="********" />
    </div>

    <button class="btn" (click)="submit()" [disabled]="loading || !token">
      {{ loading ? 'Saving...' : 'Reset password' }}
    </button>

    <div class="footer">
      <a routerLink="/login">Back to login</a>
    </div>
  </div>
</div>
