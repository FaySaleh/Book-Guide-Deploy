<nav class="nav">
  <div class="left">
    <img src="/Logo.png" alt="Book Guide Logo" class="navLogo" />

    <div class="brand-area">
      <span class="brand">{{ 'APP.TITLE' | translate }}</span>

      <span class="welcome" *ngIf="isLoggedIn && userName">
        {{ 'COMMON.WELCOME' | translate:{ name: userName } }}
      </span>
    </div>
  </div>

  <div class="right">

    <!-- Language -->
<!-- Language -->
<button
  class="lang-toggle"
  (click)="toggleLang()"
  [attr.title]="lang.current() === 'ar' ? 'Switch to English' : 'التبديل إلى العربية'"
  [attr.aria-label]="lang.current() === 'ar' ? 'Switch to English' : 'التبديل إلى العربية'"
>
  <span class="lang-track" [class.is-ar]="lang.current() === 'ar'" [class.is-en]="lang.current() === 'en'">
    <span class="lang-thumb">
      <svg viewBox="0 0 24 24" class="lang-globe" aria-hidden="true">
        <path
          d="M12 2a10 10 0 100 20 10 10 0 000-20zm6.93 9h-3.14a15.7 15.7 0 00-1.15-5A8.03 8.03 0 0118.93 11zM12 4c.8 0 2.17 1.89 2.75 5h-5.5C9.83 5.89 11.2 4 12 4zM4.07 13h3.14a15.7 15.7 0 001.15 5A8.03 8.03 0 014.07 13zm0-2A8.03 8.03 0 018.36 6a15.7 15.7 0 00-1.15 5H4.07zm7.93 9c-.8 0-2.17-1.89-2.75-5h5.5c-.58 3.11-1.95 5-2.75 5zm3.64-2a15.7 15.7 0 001.15-5h3.14a8.03 8.03 0 01-4.29 5zM9 11c.06-1.43.32-2.79.72-4h4.56c.4 1.21.66 2.57.72 4H9zm6 2a13.7 13.7 0 01-.72 4H9.72A13.7 13.7 0 019 13h6z"
          fill="currentColor"
        />
      </svg>
    </span>

    <span class="lang-label lang-ar">AR</span>
    <span class="lang-label lang-en">EN</span>
  </span>
</button>

    <!-- Library -->
    <a
      class="text-link"
      routerLink="/books"
      routerLinkActive="active"
      *ngIf="isLoggedIn"
    >
      {{ 'NAV.LIBRARY' | translate }}
    </a>

    <!-- Dashboard (Icon) -->
    <a
      class="text-link"
      routerLink="/dashboard"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      [attr.title]="'NAV.DASHBOARD' | translate"
      [attr.aria-label]="'NAV.DASHBOARD' | translate"
    >
      <svg viewBox="0 0 24 24" class="icon-svg" aria-hidden="true">
        <path
          d="M4 4h16v16H4V4zm2 14h3V10H6v8zm5 0h3V6h-3v12zm5 0h3V13h-3v5z"
        ></path>
      </svg>
    </a>

    <!-- Notifications -->
    <a
      class="text-link notif-link"
      routerLink="/notifications"
      routerLinkActive="active"
      *ngIf="isLoggedIn"
      [attr.aria-label]="'NAV.NOTIFICATIONS' | translate"
      [attr.title]="'NAV.NOTIFICATIONS' | translate"
    >
      <span class="icon-wrap">
        <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M15 17H9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M18 17V11a6 6 0 10-12 0v6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M20 17H4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M10 20a2 2 0 004 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>

        <span class="badge" *ngIf="unreadCount > 0">{{ unreadCount }}</span>
      </span>
    </a>

    <!-- Logout -->
    <a
      class="text-link"
      type="button"
      (click)="logout()"
      *ngIf="isLoggedIn"
      [attr.aria-label]="'NAV.LOGOUT' | translate"
      [attr.title]="'NAV.LOGOUT' | translate"
    >
      <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M5 3h10a2 2 0 012 2v14a2 2 0 01-2 2H5"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M13 12h.01"
              stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
        <path d="M11 12H3"
              stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M6 9l-3 3 3 3"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>

  </div>
</nav>
